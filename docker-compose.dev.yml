version: '3.8'
services:
  flutter-dev:
    image: ghcr.io/cirruslabs/flutter:stable
    container_name: influenceai-flutter-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      bash -c "flutter pub get && flutter run -d web-server --web-port 3000 --web-hostname 0.0.0.0 --dart-define-from-file=.env"
